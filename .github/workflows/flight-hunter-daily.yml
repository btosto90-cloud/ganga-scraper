name: Flight Hunter — Daily

on:
  schedule:
    # 11:00 UTC = 08:00 ART (Argentina is UTC-3 year-round)
    - cron: "0 11 * * *"
  workflow_dispatch:  # allow manual runs from the Actions tab

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to commit updated data files
    defaults:
      run:
        working-directory: flights

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: flights/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python run.py

      - name: Show output preview
        run: |
          echo "=== flights.json head ==="
          head -c 500 public/data/flights.json || true
          echo ""
          echo "=== stats ==="
          python -c "import json; d=json.load(open('public/data/flights.json')); print(json.dumps(d.get('stats',{}), indent=2)); print('Sources:', d.get('sources',{}))"

      - name: Commit changes
        run: |
          cd ..
          git config user.name "flight-hunter-bot"
          git config user.email "bot@users.noreply.github.com"
          git add flights/public/data/flights.json flights/data/price_history.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore(flights): daily refresh $(date -u +%Y-%m-%d)"
            git push
          fi
