name: Tests

on:
  push:
    branches: [main]
    paths:
      - 'scraper.py'
      - 'scoring.py'
      - 'notify.py'
      - 'tests/**'
      - '.github/workflows/tests.yml'
  pull_request:
    paths:
      - 'scraper.py'
      - 'scoring.py'
      - 'notify.py'
      - 'tests/**'

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install pytest
      - run: python -m pytest tests/ -v
