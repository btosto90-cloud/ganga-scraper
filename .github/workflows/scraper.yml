name: Run Scraper
on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'scraper.py'

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pdfminer.six requests

      - name: Run scraper
        id: scraper
        run: |
          python scraper.py 2>&1 | tee scraper_log.txt
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        env:
          ML_CLIENT_ID: ${{ secrets.ML_CLIENT_ID }}
          ML_CLIENT_SECRET: ${{ secrets.ML_CLIENT_SECRET }}
          ML_REFRESH_TOKEN: ${{ secrets.ML_REFRESH_TOKEN }}

      - name: Show summary
        if: always()
        run: |
          echo "=== RESUMEN ==="
          if [ -f listings.json ]; then
            python3 -c "
          import json
          with open('listings.json') as f:
              d = json.load(f)
          total = d.get('total', 0)
          fuentes = d.get('fuentes', {})
          updated = d.get('updated', 'N/A')
          print(f'Total listings: {total}')
          print(f'Fuentes: {fuentes}')
          print(f'Actualizado: {updated}')
          listings = d.get('listings', [])
          marcas = {}
          for l in listings:
              b = l.get('brand','other')
              marcas[b] = marcas.get(b, 0) + 1
          print('Marcas:')
          for m, c in sorted(marcas.items(), key=lambda x: -x[1]):
              print(f'  {m}: {c}')
          "
          else
            echo "listings.json no generado"
          fi

      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-debug-${{ github.run_number }}
          path: |
            scraper_log.txt
            listings.json
          retention-days: 7

      - name: Commit results
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add listings.json
          git diff --cached --quiet && echo "No changes" && exit 0
          TOTAL=$(python3 -c "import json; d=json.load(open('listings.json')); print(d.get('total',0))" 2>/dev/null || echo "?")
          git commit -m "Update listings $(date -u +%Y-%m-%d) - ${TOTAL} autos"
          git push
