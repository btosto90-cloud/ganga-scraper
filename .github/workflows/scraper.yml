name: Ganga Scraper

on:
  schedule:
    - cron: '0 6 * * *'  # Corre todos los días a las 6am UTC
  workflow_dispatch:  # También permite correrlo manualmente

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run scraper
        run: python scraper.py

      - name: Commit listings.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add listings.json
          git diff --staged --quiet || git commit -m "Update listings $(date -u +%Y-%m-%d)"
          git push
