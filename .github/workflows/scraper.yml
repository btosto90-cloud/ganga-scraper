name: Run Scraper

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'scraper.py'

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pdfminer.six requests

      - name: Run scraper
        run: python scraper.py
        env:
          ML_TOKEN: ${{ secrets.ML_TOKEN }}
          ML_CLIENT_SECRET: ${{ secrets.ML_CLIENT_SECRET }}

      - name: Upload debug HTML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ml-debug
          path: ml_debug.html

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout origin/main -- . 2>/dev/null || true
          git add listings.json cca_precios.json
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Update listings $(date -u +%Y-%m-%d)"
          git push
